name: Crypto Signal Check

on:
  workflow_dispatch:  # Triggered externally by cron-job.org on exact 4h schedule

jobs:
  run-signals:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # allows the workflow to commit back to the repo

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python step9_alert_cloud.py

      - name: Save candle data back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          git diff --cached --quiet || git commit -m "update candle data [skip ci]"
          git push
